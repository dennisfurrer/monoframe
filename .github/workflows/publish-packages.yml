name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (no publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "22.14"
  PNPM_VERSION: "10.15.0"

jobs:
  ci:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm lint

  publish:
    name: Bump & Publish
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions
        run: |
          BUMP=${{ inputs.bump }}
          for pkg in packages/ui-atoms packages/ui-molecules packages/db; do
            cd "$pkg"
            # Remove "private": true for publishing, bump version
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              const [major, minor, patch] = pkg.version.split('.').map(Number);
              if ('$BUMP' === 'major') pkg.version = \`\${major+1}.0.0\`;
              else if ('$BUMP' === 'minor') pkg.version = \`\${major}.\${minor+1}.0\`;
              else pkg.version = \`\${major}.\${minor}.\${patch+1}\`;
              delete pkg.private;
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
              console.log(\`\${pkg.name}@\${pkg.version}\`);
            "
            cd "$GITHUB_WORKSPACE"
          done

      - name: Build packages
        run: pnpm build

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: |
          for pkg in packages/db packages/ui-atoms packages/ui-molecules; do
            cd "$pkg"
            pnpm publish --access public --no-git-checks
            cd "$GITHUB_WORKSPACE"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (dry run)
        if: ${{ inputs.dry_run }}
        run: |
          for pkg in packages/db packages/ui-atoms packages/ui-molecules; do
            cd "$pkg"
            pnpm publish --access public --no-git-checks --dry-run
            cd "$GITHUB_WORKSPACE"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bumps
        if: ${{ !inputs.dry_run }}
        run: |
          git add -A
          git commit -m "chore: release packages (${{ inputs.bump }} bump)"
          git push
